<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王诗慧 - 个人主页</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑",sans-serif;
        }
        body{
            background: linear-gradient(135deg, #fff0f5, #fde8ef);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card{
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(233, 154, 181, 0.25);
            overflow: hidden;
            padding: 30px;
            /* 卡片悬浮微动效果 */
            transition: all 0.4s ease;
            animation: float 4s ease-in-out infinite;
        }
        .card:hover{
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(233, 154, 181, 0.35);
        }
        /* 卡片浮动动画 */
        @keyframes float {
            0%,100%{transform: translateY(0px);}
            50%{transform: translateY(-5px);}
        }
        .avatar-box{
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f8a8c0;
            /* 头像旋转光影动态 */
            transition: transform 0.3s ease;
        }
        .avatar:hover{
            transform: scale(1.08) rotate(3deg);
        }
        .name{
            font-size: 26px;
            font-weight: 600;
            color: #d6688c;
            text-align: center;
            margin: 10px 0 5px;
        }
        .age-txt{
            color: #99667a;
            text-align: center;
            margin-bottom: 25px;
        }
        .info-item{
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #fce4ec;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }
        /* 条目依次淡入 */
        .info-item:nth-child(2){animation-delay: 0.2s;}
        .info-item:nth-child(3){animation-delay: 0.4s;}
        .info-item:nth-child(4){animation-delay: 0.6s;}
        .info-item:nth-child(5){animation-delay: 0.8s;}
        .info-item:nth-child(6){animation-delay: 1s;}
        @keyframes fadeIn {
            to{opacity: 1;}
        }
        .info-label{
            width: 90px;
            color: #e07a9c;
            font-weight: 500;
        }
        .info-content{
            flex: 1;
            color: #444;
            line-height: 1.6;
        }
        .hobby-tag{
            display: inline-block;
            background: #ffe8f0;
            color: #d6688c;
            padding: 4px 10px;
            border-radius: 15px;
            margin: 3px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .hobby-tag:hover{
            background: #f8a8c0;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 已嵌入你的头像，直接使用即可 -->
        <div class="avatar-box">
            <img class="avatar" src="头像.png" alt="个人头像">
        </div>
        <h2 class="name">王诗慧</h2>
        <p class="age-txt">23岁</p>

        <div class="info-item">
            <div class="info-label">联系方式</div>
            <div class="info-content">13jjaenaa@gmail.com</div>
        </div>

        <div class="info-item">
            <div class="info-label">兴趣爱好</div>
            <div class="info-content">
                <span class="hobby-tag">听音乐</span>
                <span class="hobby-tag">摄影</span>
                <span class="hobby-tag">旅游</span>
            </div>
        </div>

        <div class="info-item">
            <div class="info-label">本科院校</div>
            <div class="info-content">中国医科大学 生物技术专业</div>
        </div>

        <div class="info-item">
            <div class="info-label">硕士院校</div>
            <div class="info-content">杭州医学研究所 药学专业</div>
        </div>

        <div class="info-item">
            <div class="info-label">研究方向</div>
            <div class="info-content">纳米抗体</div>
        </div>
    </div>
</body>
</html>
