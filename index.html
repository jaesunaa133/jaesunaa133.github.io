<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>王诗慧 - 个人主页</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑",sans-serif;
        }
        body{
            background: linear-gradient(135deg, #fff0f5, #fde8ef);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card{
            width: 100%;
            max-width: 480px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(233, 154, 181, 0.25);
            overflow: hidden;
            padding: 30px;
            transition: all 0.4s ease;
            animation: float 4s ease-in-out infinite;
        }
        .card:hover{
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(233, 154, 181, 0.35);
        }
        @keyframes float {
            0%,100%{transform: translateY(0px);}
            50%{transform: translateY(-5px);}
        }
        .avatar-box{
            text-align: center;
            margin-bottom: 20px;
        }
        .avatar{
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f8a8c0;
            transition: transform 0.3s ease;
        }
        .avatar:hover{
            transform: scale(1.08) rotate(3deg);
        }
        .name{
            font-size: 26px;
            font-weight: 600;
            color: #d6688c;
            text-align: center;
            margin: 10px 0 5px;
        }
        .age-txt{
            color: #99667a;
            text-align: center;
            margin-bottom: 25px;
        }
        .info-item{
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #fce4ec;
            opacity: 0;
            animation: fadeIn 0.8s forwards;
        }
        .info-item:nth-child(2){animation-delay: 0.2s;}
        .info-item:nth-child(3){animation-delay: 0.4s;}
        .info-item:nth-child(4){animation-delay: 0.6s;}
        .info-item:nth-child(5){animation-delay: 0.8s;}
        .info-item:nth-child(6){animation-delay: 1s;}
        @keyframes fadeIn {
            to{opacity: 1;}
        }
        .info-label{
            width: 90px;
            color: #e07a9c;
            font-weight: 500;
        }
        .info-content{
            flex: 1;
            color: #444;
            line-height: 1.6;
        }
        .hobby-tag{
            display: inline-block;
            background: #ffe8f0;
            color: #d6688c;
            padding: 4px 10px;
            border-radius: 15px;
            margin: 3px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .hobby-tag:hover{
            background: #f8a8c0;
            color: white;
            transform: scale(1.05);
        }
        .gallery-title{
            font-size: 18px;
            color: #d6688c;
            margin: 25px 0 15px;
            text-align: center;
            font-weight: 600;
        }
        .gallery{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

       
        .gallery-item{
            border-radius: 10px;
            overflow: hidden;
            aspect-ratio: 1;
            transition: all 0.4s ease;
            opacity: 0;
            animation: fadeIn 0.8s forwards, imgFloat 3s ease-in-out infinite;
        }
        .gallery-item:nth-child(1){animation-delay: 1.2s, 0s;}
        .gallery-item:nth-child(2){animation-delay: 1.4s, 0.3s;}
        .gallery-item:nth-child(3){animation-delay: 1.6s, 0.6s;}

        .gallery-item:hover{
            transform: scale(1.12) rotate(1deg);
            box-shadow: 0 6px 20px rgba(233, 154, 181, 0.4);
        }
        .gallery-img{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes imgFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

    </style>
</head>
<body>
    <div class="card">
        <div class="avatar-box">
            <img class="avatar" src="0fc5d2a8-b4af-48a8-8359-362bb670a299.png" alt="个人头像">
        </div>
        <h2 class="name">王诗慧</h2>
        <p class="age-txt">23岁</p>

        <div class="info-item">
            <div class="info-label">联系方式</div>
            <div class="info-content">13jjaenaa@gmail.com</div>
        </div>

        <div class="info-item">
            <div class="info-label">兴趣爱好</div>
            <div class="info-content">
                <span class="hobby-tag">摄影</span>
                <span class="hobby-tag">旅游</span>
                <span class="hobby-tag">听音乐</span>
            </div>
        </div>

        <div class="info-item">
            <div class="info-label">本科院校</div>
            <div class="info-content">中国医科大学 生物技术专业</div>
        </div>

        <div class="info-item">
            <div class="info-label">硕士院校</div>
            <div class="info-content">杭州医学研究所 药学专业</div>
        </div>

        <div class="info-item">
            <div class="info-label">研究方向</div>
            <div class="info-content">纳米抗体</div>
        </div>

        <div class="gallery-title">📸 我的旅行与摄影</div>
        <div class="gallery">
            <div class="gallery-item">
                <img class="gallery-img" src="c413a75e-689a-48b0-b9e0-3246d5d98e11.png" alt="旅行摄影1">
            </div>
            <div class="gallery-item">
                <img class="gallery-img" src="4818d69f-51c2-4871-b48f-6160db91d94f.png" alt="旅行摄影2">
            </div>
            <div class="gallery-item">
                <img class="gallery-img" src="ea434312-acd1-4544-96e6-f8d316db2b44.png" alt="旅行摄影3">
            </div>
        </div>
    </div>
</body>
</html>
